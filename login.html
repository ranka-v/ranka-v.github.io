<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ranka • Sign In</title>

    <!-- Security & SEO -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="rating" content="General">
    <meta name="google" content="notranslate">

    <!-- Open Graph -->
    <meta property="og:site_name" content="Ranka">
    <meta property="og:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta property="og:description" content="East Africa's community-driven ranking platform. Vote, rank, and discover the best products, places, and services.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ranka.ug">
    <meta property="og:image" content="https://ranka.ug/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta name="twitter:description" content="East Africa's community-driven ranking platform.">

    <!-- Styles -->
    <link rel="stylesheet" href="ranka.css">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body class="auth-centered-body">
    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-section">
            <a href="index.html" style="text-decoration:none;">
                <div class="crescent-ball large"></div>
                <div class="logo-text large">Ranka</div>
            </a>
        </div>

        <!-- Login Card -->
        <div class="auth-card">
            <h2>👋 Welcome Back</h2>
            <p class="subtitle">Sign in to vote, comment, and submit listings.</p>

            <div class="error-message" id="errorMsg"></div>

            <!-- Google Sign-In Button -->
            <button type="button" class="google-btn" onclick="handleGoogleSignIn()" style="margin-bottom:16px;">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider">or sign in with email</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">
                        Password
                        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot?</a>
                    </label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign In</button>
            </form>

            <div class="divider">or</div>

            <p class="alt-link">
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>

        <p style="text-align:center; margin-top:20px; color:#64748b; font-size:0.8rem;">
            <a href="index.html" style="color:#94a3b8; text-decoration:none;">← Back to home</a>
        </p>
    </div>

    <script>
        // ============================================
        // LOGIN PAGE LOGIC
        // ============================================

        // Check if already logged in — redirect to feed
        async function checkSession() {
            initSupabase();
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'feed.html';
            }
        }
        checkSession();

        // Google Sign-In handler
        async function handleGoogleSignIn() {
            const btn = document.querySelector('.google-btn');
            btn.disabled = true;
            btn.textContent = 'Redirecting to Google...';
            
            const { error } = await signInWithGoogle();
            
            if (error) {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                `;
                const errorEl = document.getElementById('errorMsg');
                errorEl.textContent = error.message || 'Google sign-in failed. Please try again.';
                errorEl.classList.add('visible');
            }
        }

        // Handle email/password form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('errorMsg');

            errorEl.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const { data, error } = await sb.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                let message = error.message;
                if (message.includes('Invalid login credentials')) {
                    message = 'Invalid email or password. Please try again.';
                }
                errorEl.textContent = message;
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            // Success — redirect to feed.html (or the page they came from)
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect') || 'feed.html';
            window.location.href = redirect;
        });

        // Handle forgot password
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const errorEl = document.getElementById('errorMsg');
            
            if (!email) {
                errorEl.textContent = 'Enter your email first, then click Forgot.';
                errorEl.classList.add('visible');
                return;
            }

            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });

            if (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('visible');
            } else {
                errorEl.textContent = '✅ Password reset link sent! Check your email.';
                errorEl.style.background = 'rgba(16, 185, 129, 0.15)';
                errorEl.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                errorEl.style.color = '#10b981';
                errorEl.classList.add('visible');
            }
        }
    </script>
</body>
</html>
