<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ranka • Create Account</title>

    <!-- Security & SEO -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="rating" content="General">
    <meta name="google" content="notranslate">

    <!-- Open Graph -->
    <meta property="og:site_name" content="Ranka">
    <meta property="og:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta property="og:description" content="East Africa's community-driven ranking platform. Vote, rank, and discover the best products, places, and services.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ranka.ug">
    <meta property="og:image" content="https://ranka.ug/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta name="twitter:description" content="East Africa's community-driven ranking platform.">

    <!-- Styles -->
    <link rel="stylesheet" href="ranka.css">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body class="auth-centered-body">
    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-section">
            <a href="index.html" style="text-decoration:none;">
                <div class="crescent-ball large"></div>
                <div class="logo-text large">Ranka</div>
            </a>
        </div>

        <!-- Register Card -->
        <div class="auth-card">
            <h2>🚀 Join Ranka</h2>
            <p class="subtitle">Create your account and start ranking.</p>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <!-- Google Sign-In Button -->
            <button type="button" class="google-btn" onclick="handleGoogleSignIn()" style="margin-bottom:16px;">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider">or sign up with email</div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input type="text" id="username" placeholder="yourname" required maxlength="30" autocomplete="username">
                    <p class="helper-text">3-30 characters. Letters, numbers, and underscores only.</p>
                </div>
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" placeholder="Your Full Name" maxlength="50">
                    <p class="helper-text">How your name appears to others.</p>
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Create Account</button>
            </form>

            <p style="text-align:center; color:#64748b; font-size:0.75rem; margin-top:16px; line-height:1.4;">
                By signing up, you agree to our <a href="terms.html" style="color:#94a3b8;">Terms of Service</a> and <a href="privacy.html" style="color:#94a3b8;">Privacy Policy</a>.
            </p>

            <div class="divider">or</div>

            <p class="alt-link">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>

        <p style="text-align:center; margin-top:20px; color:#64748b; font-size:0.8rem;">
            <a href="index.html" style="color:#94a3b8; text-decoration:none;">← Back to home</a>
        </p>
    </div>

    <script>
        // ============================================
        // REGISTER PAGE LOGIC
        // ============================================

        // Check if already logged in — redirect to feed
        async function checkSession() {
            initSupabase();
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'feed.html';
            }
        }
        checkSession();

        // Google Sign-In handler
        async function handleGoogleSignIn() {
            const btn = document.querySelector('.google-btn');
            btn.disabled = true;
            btn.textContent = 'Redirecting to Google...';
            
            const { error } = await signInWithGoogle();
            
            if (error) {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                `;
                const errorEl = document.getElementById('errorMsg');
                errorEl.textContent = error.message || 'Google sign-in failed. Please try again.';
                errorEl.classList.add('visible');
            }
        }

        // Validate username format
        function isValidUsername(username) {
            return /^[a-zA-Z0-9_]{3,30}$/.test(username);
        }

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('errorMsg');
            const successEl = document.getElementById('successMsg');

            errorEl.classList.remove('visible');
            successEl.classList.remove('visible');

            // Validate username
            if (!isValidUsername(username)) {
                errorEl.textContent = 'Username must be 3-30 characters (letters, numbers, underscores only).';
                errorEl.classList.add('visible');
                return;
            }

            // Validate password
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                errorEl.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            // Check if username is taken
            const { data: existingUser } = await sb
                .from('profiles')
                .select('username')
                .eq('username', username)
                .maybeSingle();

            if (existingUser) {
                errorEl.textContent = 'This username is already taken. Please choose another.';
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            // Sign up with Supabase Auth
            const { data, error } = await sb.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username,
                        display_name: displayName || username
                    }
                }
            });

            if (error) {
                let message = error.message;
                if (message.includes('already registered')) {
                    message = 'This email is already registered. Try signing in instead.';
                }
                errorEl.textContent = message;
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            // Success
            if (data.user && data.user.identities && data.user.identities.length === 0) {
                // Email already registered but not confirmed
                successEl.textContent = '📧 Account exists! Check your email for confirmation, or sign in.';
                successEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            } else {
                // New user created
                successEl.textContent = '✅ Account created! Redirecting...';
                successEl.classList.add('visible');
                
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 1500);
            }
        });

        // Live username validation feedback
        document.getElementById('username').addEventListener('input', function() {
            const val = this.value;
            if (val.length > 0 && !isValidUsername(val)) {
                this.style.borderColor = '#ef4444';
            } else {
                this.style.borderColor = val.length >= 3 ? '#10b981' : '#334155';
            }
        });
    </script>
</body>
</html>
