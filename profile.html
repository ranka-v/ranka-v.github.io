<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ranka • Profile</title>

    <!-- Security & SEO -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="rating" content="General">
    <meta name="google" content="notranslate">

    <!-- Open Graph -->
    <meta property="og:site_name" content="Ranka">
    <meta property="og:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta property="og:description" content="East Africa's community-driven ranking platform. Vote, rank, and discover the best products, places, and services.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ranka.ug">
    <meta property="og:image" content="https://ranka.ug/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta name="twitter:description" content="East Africa's community-driven ranking platform.">

    <!-- Styles -->
    <link rel="stylesheet" href="ranka.css">
    <style>
        /* ========== PROFILE-SPECIFIC STYLES ========== */

        .username-text {
            font-weight: 700;
            font-size: 1.1rem;
            flex: 1;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
        }

        /* Profile Header */
        .profile-header {
            padding: 20px 16px;
            text-align: center;
        }

        .display-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .username-handle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .bio-text {
            color: #cbd5e1;
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 0 20px;
        }

        .website-link {
            color: #ec4899;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: block;
            margin-top: 4px;
        }
        .website-link:hover {
            text-decoration: underline;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 8px;
            padding: 0 16px;
            justify-content: center;
        }

        .btn-following {
            background: transparent;
            border: 1px solid #334155;
            color: #cbd5e1;
        }

        /* Tabs */
        .profile-tabs {
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 16px;
        }

        .profile-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: inherit;
            transition: all 0.2s;
        }
        .profile-tab.active {
            color: #ec4899;
            border-bottom-color: #ec4899;
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2px;
            padding: 2px;
        }

        .post-thumb {
            aspect-ratio: 1;
            background: rgba(15, 23, 42, 0.6);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .post-thumb:hover img {
            transform: scale(1.04);
        }

        .thumb-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .post-thumb:hover .thumb-overlay {
            opacity: 1;
        }

        /* List view */
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .post-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.3);
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }
        .post-list-item:hover {
            background: rgba(30, 41, 59, 0.5);
        }

        .post-list-thumb {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.6);
        }

        .post-list-info {
            flex: 1;
            min-width: 0;
        }

        .post-list-title {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-list-meta {
            color: #64748b;
            font-size: 0.7rem;
        }

        .post-list-score {
            font-weight: 700;
            font-size: 0.8rem;
        }

        .empty-grid {
            grid-column: span 3;
        }
    </style>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <div class="app">
        <!-- Top Nav -->
        <div class="top-nav">
            <button class="back-btn" onclick="history.back()">←</button>
            <span class="username-text" id="navUsername">Profile</span>
            <a href="settings.html" class="settings-btn" id="settingsLink" style="display:none;">⚙️</a>
        </div>

        <!-- Profile Content -->
        <div id="profileContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>

        <div class="bottom-spacer"></div>

        <!-- Bottom Nav -->
        <div class="bottom-nav">
            <a href="feed.html">🏠<span>Feed</span></a>
            <a href="search.html">🔍<span>Search</span></a>
            <a href="create-post.html">➕<span>Post</span></a>
            <a href="explore.html">🌍<span>Explore</span></a>
            <a href="profile.html" class="active">👤<span>Profile</span></a>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // PROFILE PAGE LOGIC
        // ============================================

        initSupabase();

        let currentUser = null;
        let profileUser = null;
        let isOwnProfile = false;
        let isFollowing = false;
        let listings = [];
        let currentView = 'grid';
        let followerCount = 0;
        let followingCount = 0;

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            currentUser = user;

            const usernameParam = getUrlParam('username');

            if (usernameParam) {
                await loadProfileByUsername(usernameParam);
            } else if (currentUser) {
                await loadProfileByUserId(currentUser.id);
            } else {
                window.location.href = 'login.html?redirect=profile.html';
            }
        }

        async function loadProfileByUsername(username) {
            const { data: profile, error } = await sb
                .from('profiles')
                .select('*')
                .eq('username', username)
                .single();

            if (error || !profile) {
                document.getElementById('profileContent').innerHTML = `
                    <div class="empty-state" style="padding:60px;">
                        <div class="icon">😕</div>
                        <h3>User Not Found</h3>
                    </div>`;
                return;
            }

            profileUser = profile;
            isOwnProfile = currentUser && currentUser.id === profile.id;
            await loadProfileData();
        }

        async function loadProfileByUserId(userId) {
            const { data: profile, error } = await sb
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .single();

            if (error || !profile) {
                document.getElementById('profileContent').innerHTML = `
                    <div class="empty-state" style="padding:60px;">
                        <div class="icon">😕</div>
                        <h3>Profile Not Found</h3>
                    </div>`;
                return;
            }

            profileUser = profile;
            isOwnProfile = true;
            await loadProfileData();
        }

        async function loadProfileData() {
            // Get follower / following counts
            const [followerRes, followingRes] = await Promise.all([
                sb.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', profileUser.id),
                sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', profileUser.id)
            ]);
            followerCount = followerRes.count || 0;
            followingCount = followingRes.count || 0;

            // Check if current user follows this profile
            if (currentUser && !isOwnProfile) {
                const { data: follow } = await sb
                    .from('follows')
                    .select('id')
                    .eq('follower_id', currentUser.id)
                    .eq('following_id', profileUser.id)
                    .maybeSingle();
                isFollowing = !!follow;
            }

            // Get listings
            const { data: rawListings } = await sb
                .from('listings')
                .select('id, title, image_url, images, created_at, category_id, categories:category_id (name, icon)')
                .eq('submitted_by', profileUser.id)
                .order('created_at', { ascending: false });

            // Get scores for each listing
            listings = await Promise.all((rawListings || []).map(async (l) => {
                const scoreData = await getListingScore(l.id);
                return { ...l, ...scoreData };
            }));

            // Update OG title for this profile
            const displayName = profileUser.display_name || profileUser.username || 'User';
            document.title = `Ranka • ${displayName}`;
            const ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', `${displayName} on Ranka`);

            renderProfile();
        }

        function renderProfile() {
            document.getElementById('navUsername').textContent = profileUser.username || 'Profile';
            document.getElementById('settingsLink').style.display = isOwnProfile ? 'inline' : 'none';

            const displayName = profileUser.display_name || profileUser.username || 'User';
            const container = document.getElementById('profileContent');

            container.innerHTML = `
                <div class="profile-header">
                    <div class="avatar lg">
                        ${profileUser.avatar_url ? `<img src="${profileUser.avatar_url}" alt="">` : displayName.charAt(0).toUpperCase()}
                    </div>
                    <div class="display-name">${esc(displayName)}</div>
                    <div class="username-handle">@${esc(profileUser.username || 'user')}</div>
                    ${profileUser.bio ? `<div class="bio-text">${esc(profileUser.bio)}</div>` : ''}
                    ${profileUser.website ? `<a href="${profileUser.website}" target="_blank" rel="noopener" class="website-link">🔗 ${profileUser.website.replace(/^https?:\/\//, '')}</a>` : ''}

                    <div class="stats-row">
                        <button class="stat-item" onclick="viewFollowers()">
                            <div class="stat-value">${formatNum(followerCount)}</div>
                            <div class="stat-label">Followers</div>
                        </button>
                        <button class="stat-item" onclick="viewFollowing()">
                            <div class="stat-value">${formatNum(followingCount)}</div>
                            <div class="stat-label">Following</div>
                        </button>
                        <div class="stat-item">
                            <div class="stat-value">${listings.length}</div>
                            <div class="stat-label">Posts</div>
                        </div>
                    </div>

                    <div class="action-row">
                        ${isOwnProfile ? `
                            <a href="settings.html" class="btn btn-outline">Edit Profile</a>
                            <a href="my-listings.html" class="btn btn-outline">Manage Posts</a>
                        ` : `
                            <button class="btn ${isFollowing ? 'btn-following' : 'btn-primary'}" id="followBtn" onclick="toggleFollow()">
                                ${isFollowing ? 'Following' : 'Follow'}
                            </button>
                            <button class="btn btn-outline" onclick="window.location.href='chat.html?listing=${listings[0]?.id || ''}'">Message</button>
                        `}
                    </div>
                </div>

                <div class="profile-tabs">
                    <button class="profile-tab active" onclick="switchView('grid')">📷 Grid</button>
                    <button class="profile-tab" onclick="switchView('list')">📋 List</button>
                </div>

                <div id="postsContainer">
                    ${renderPostsGrid()}
                </div>
            `;
        }

        function renderPostsGrid() {
            if (listings.length === 0) {
                return `
                    <div class="posts-grid">
                        <div class="empty-state empty-grid">
                            <div class="icon">📸</div>
                            <p>No posts yet</p>
                            ${isOwnProfile ? '<a href="create-post.html" class="btn btn-primary" style="margin-top:10px;">Create Post</a>' : ''}
                        </div>
                    </div>`;
            }

            return `
                <div class="posts-grid">
                    ${listings.map(l => {
                        const img = l.images?.[0] || l.image_url || '';
                        return `
                            <div class="post-thumb" onclick="window.location.href='listing.html?id=${l.id}'">
                                ${img ? `<img src="${img}" alt="" loading="lazy" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;">📸</div>'}
                                <div class="thumb-overlay">
                                    <span>▲ ${l.upvotes}</span>
                                    <span>▼ ${l.downvotes}</span>
                                </div>
                            </div>`;
                    }).join('')}
                </div>`;
        }

        function renderPostsList() {
            if (listings.length === 0) {
                return `<div class="empty-state"><div class="icon">📋</div><p>No posts yet</p></div>`;
            }

            const scoreClass = (s) => s > 0 ? 'score-pos' : s < 0 ? 'score-neg' : 'score-zero';

            return `
                <div class="posts-list">
                    ${listings.map(l => `
                        <a href="listing.html?id=${l.id}" class="post-list-item">
                            <img src="${l.images?.[0] || l.image_url || ''}" class="post-list-thumb" onerror="this.style.display='none'" alt="">
                            <div class="post-list-info">
                                <div class="post-list-title">${esc(l.title)}</div>
                                <div class="post-list-meta">${l.categories?.icon || ''} ${l.categories?.name || ''} · ${timeAgo(l.created_at)}</div>
                            </div>
                            <div class="post-list-score ${scoreClass(l.score)}">${l.score > 0 ? '+' : ''}${l.score}</div>
                        </a>
                    `).join('')}
                </div>`;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.profile-tab')[view === 'grid' ? 0 : 1].classList.add('active');
            document.getElementById('postsContainer').innerHTML = view === 'grid' ? renderPostsGrid() : renderPostsList();
        }

        async function toggleFollow() {
            if (!currentUser) {
                showToast('Sign in to follow');
                return;
            }

            const btn = document.getElementById('followBtn');

            if (isFollowing) {
                await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', profileUser.id);
                isFollowing = false;
                followerCount = Math.max(0, followerCount - 1);
                if (btn) {
                    btn.textContent = 'Follow';
                    btn.className = 'btn btn-primary';
                }
            } else {
                await sb.from('follows').insert({ follower_id: currentUser.id, following_id: profileUser.id });
                isFollowing = true;
                followerCount++;
                if (btn) {
                    btn.textContent = 'Following';
                    btn.className = 'btn btn-following';
                }
            }

            // Update follower count display
            const statVal = document.querySelector('.stat-item .stat-value');
            if (statVal) statVal.textContent = formatNum(followerCount);
        }

        function viewFollowers() {
            window.location.href = `followers.html?username=${profileUser.username}&type=followers`;
        }

        function viewFollowing() {
            window.location.href = `followers.html?username=${profileUser.username}&type=following`;
        }

        init();
    </script>
</body>
</html>
