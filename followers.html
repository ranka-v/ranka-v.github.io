<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ranka • Followers</title>

    <!-- Security & SEO -->
    <meta name="robots" content="noindex, follow">
    <meta name="googlebot" content="noindex, follow">
    <meta name="rating" content="General">
    <meta name="google" content="notranslate">

    <!-- Open Graph -->
    <meta property="og:site_name" content="Ranka">
    <meta property="og:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta property="og:description" content="East Africa's community-driven ranking platform. Vote, rank, and discover the best products, places, and services.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ranka.ug">
    <meta property="og:image" content="https://ranka.ug/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ranka — Rank the Best. Discover the Rest.">
    <meta name="twitter:description" content="East Africa's community-driven ranking platform.">

    <!-- Styles -->
    <link rel="stylesheet" href="ranka.css">
    <style>
        /* ========== FOLLOWERS-SPECIFIC STYLES ========== */

        .nav-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-title {
            font-weight: 700;
            font-size: 1.1rem;
            flex: 1;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-top: 10px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.4);
            border: none;
            color: #94a3b8;
            font-family: inherit;
            transition: all 0.2s;
        }
        .tab.active {
            background: rgba(236, 72, 153, 0.15);
            color: #ec4899;
        }

        /* User List */
        .user-list {
            padding: 8px 0;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: #fff;
            transition: background 0.15s;
        }
        .user-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }
        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .user-username {
            color: #64748b;
            font-size: 0.8rem;
        }
        .user-bio {
            color: #94a3b8;
            font-size: 0.75rem;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-btn {
            padding: 7px 18px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
            background: #ec4899;
            color: white;
        }
        .action-btn.following {
            background: transparent;
            border: 1px solid #334155;
            color: #cbd5e1;
        }
        .action-btn.self {
            display: none;
        }

        /* Search */
        .search-box {
            padding: 8px 16px 12px;
        }
        .search-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .search-input:focus {
            outline: none;
            border-color: #ec4899;
        }
        .search-input::placeholder {
            color: #64748b;
        }
    </style>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <div class="app">
        <!-- Top Nav -->
        <div class="top-nav" style="flex-direction:column;align-items:stretch;gap:0;">
            <div class="nav-row" style="padding-bottom:0;">
                <button class="back-btn" onclick="history.back()">←</button>
                <span class="nav-title" id="navTitle">Followers</span>
            </div>
            <div class="tabs">
                <button class="tab active" id="tabFollowers" onclick="switchTab('followers')">Followers</button>
                <button class="tab" id="tabFollowing" onclick="switchTab('following')">Following</button>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search..." oninput="filterUsers()">
        </div>

        <!-- User List -->
        <div class="user-list" id="userList">
            <div class="loading">
                <div class="spinner sm"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // FOLLOWERS PAGE LOGIC
        // ============================================

        initSupabase();

        let currentUser = null;
        let profileUserId = null;
        let currentTab = 'followers';
        let allUsers = [];
        let followingSet = new Set();

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            currentUser = user;

            const username = getUrlParam('username');
            const type = getUrlParam('type') || 'followers';
            currentTab = type;

            if (!username) {
                if (!currentUser) {
                    window.location.href = 'login.html';
                    return;
                }
                // Show own followers
                profileUserId = currentUser.id;
            } else {
                const { data: profile } = await sb
                    .from('profiles')
                    .select('id')
                    .eq('username', username)
                    .single();

                if (!profile) {
                    document.getElementById('userList').innerHTML = '<div class="empty-state"><p>User not found</p></div>';
                    return;
                }
                profileUserId = profile.id;
            }

            document.getElementById('navTitle').textContent = username ? `@${username}` : 'My Network';
            updateTabs();

            if (currentUser) await loadMyFollowing();
            await loadUsers();
        }

        async function loadMyFollowing() {
            const { data } = await sb
                .from('follows')
                .select('following_id')
                .eq('follower_id', currentUser.id);
            followingSet = new Set((data || []).map(f => f.following_id));
        }

        function updateTabs() {
            document.getElementById('tabFollowers').classList.toggle('active', currentTab === 'followers');
            document.getElementById('tabFollowing').classList.toggle('active', currentTab === 'following');
        }

        async function loadUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = '<div class="loading"><div class="spinner sm"></div></div>';

            let userIds = [];
            if (currentTab === 'followers') {
                const { data } = await sb
                    .from('follows')
                    .select('follower_id')
                    .eq('following_id', profileUserId);
                userIds = (data || []).map(f => f.follower_id);
            } else {
                const { data } = await sb
                    .from('follows')
                    .select('following_id')
                    .eq('follower_id', profileUserId);
                userIds = (data || []).map(f => f.following_id);
            }

            if (userIds.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👤</div>
                        <p>${currentTab === 'followers' ? 'No followers yet' : 'Not following anyone yet'}</p>
                    </div>`;
                return;
            }

            const { data: profiles } = await sb
                .from('profiles')
                .select('id, username, display_name, avatar_url, bio')
                .in('id', userIds);

            allUsers = profiles || [];
            renderUsers(allUsers);
        }

        function renderUsers(users) {
            const list = document.getElementById('userList');

            if (users.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No results match your search</p></div>';
                return;
            }

            list.innerHTML = users.map(u => {
                const displayName = u.display_name || u.username || 'User';
                const isSelf = currentUser && u.id === currentUser.id;
                const isFollowed = followingSet.has(u.id);

                return `
                    <a href="profile.html?username=${u.username}" class="user-item">
                        <div class="avatar">
                            ${u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : displayName.charAt(0).toUpperCase()}
                        </div>
                        <div class="user-info">
                            <div class="user-name">${esc(displayName)}</div>
                            <div class="user-username">@${esc(u.username || 'user')}</div>
                            ${u.bio ? `<div class="user-bio">${esc(u.bio)}</div>` : ''}
                        </div>
                        <button class="action-btn ${isSelf ? 'self' : isFollowed ? 'following' : ''}" 
                                onclick="handleFollow(event, '${u.id}')">
                            ${isSelf ? '' : isFollowed ? 'Following' : 'Follow'}
                        </button>
                    </a>
                `;
            }).join('');
        }

        async function handleFollow(e, userId) {
            e.preventDefault();
            e.stopPropagation();

            if (!currentUser) {
                showToast('Sign in to follow');
                return;
            }
            if (userId === currentUser.id) return;

            const btn = e.target;
            if (followingSet.has(userId)) {
                await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', userId);
                followingSet.delete(userId);
                if (btn) {
                    btn.textContent = 'Follow';
                    btn.className = 'action-btn';
                }
            } else {
                await sb.from('follows').insert({ follower_id: currentUser.id, following_id: userId });
                followingSet.add(userId);
                if (btn) {
                    btn.textContent = 'Following';
                    btn.className = 'action-btn following';
                }
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            updateTabs();
            document.getElementById('searchInput').value = '';
            loadUsers();
        }

        function filterUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!q) {
                renderUsers(allUsers);
                return;
            }
            const filtered = allUsers.filter(u =>
                (u.username || '').toLowerCase().includes(q) ||
                (u.display_name || '').toLowerCase().includes(q) ||
                (u.bio || '').toLowerCase().includes(q)
            );
            renderUsers(filtered);
        }

        init();
    </script>
</body>
</html>
